name: GitHub Classroom Workflow

# ==========================================
# ⚠️ 警告：请勿修改此文件及 .github/ 目录下的任何内容！
# ⚠️ 警告：请勿修改 tests/ 目录下的任何测试代码！
# ==========================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Autograding and Generate Score
        run: |
          python .github/autograde.py
